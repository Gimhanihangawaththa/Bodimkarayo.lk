## Load environment variables from .env file
spring.config.import=optional:file:.env[.properties]

## Database
#spring.datasource.url=jdbc:mariadb://localhost:3306/bodimkarayo_db
#spring.datasource.username=root
#spring.datasource.password=admin123
#
## JPA
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/bodimkarayo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bodim_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:StrongPassword123!}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

##Server
server.port=${SERVER_PORT:4000}

## Multipart Upload Limits
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=150MB

## JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-should-be-at-least-32-characters-long-for-security}
jwt.expiration=86400000

## Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

## Elasticsearch
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s
